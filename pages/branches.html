<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GitHub Repo Branch Auditor</title>
  <link rel="stylesheet" href="../css/shared.css" />
  <style>
    .stat-lbl { font-family: monospace; }
    .branch { font-family: monospace; font-size: 12px; background: #f0efe8; padding: 2px 8px; border-radius: 6px; display: inline-block; }
    .col-pr      { width: 36px; min-width: 36px; text-align: center; padding: 0 4px; }
    .col-name    { width: 33%; }
    .col-branch  { width: 22%; }
    .col-stars   { width: 8%; text-align: center; font-size: 12px; color: #888; }
    .col-issues  { width: 8%; text-align: center; font-size: 12px; color: #888; }
    .col-lang    { width: 10%; font-size: 12px; color: #666; }
    .col-license { width: 12%; font-size: 11px; color: #888; }
    .col-updated { width: 12%; font-size: 12px; color: #888; }
    .pr-alert    { font-size: 14px; cursor: default; }
    .pr-loading  { color: #ccc; font-size: 12px; }
    .row-archived td { background: #f4f4f2; color: #aaa; }
    .row-archived td a { color: #bbb; }
    .row-fork td { background: #f0f6ff; }
    .btn-active  { outline: 2px solid #185FA5; outline-offset: -2px; }
    .stat        { cursor: pointer; }
    .stat:hover  { background: #f0f0ec; }
    .stat-active { outline: 2px solid #185FA5; outline-offset: -2px; }
  </style>
</head>
<body>
  <a href="../index.html" class="back-link">← GitHub Tools</a>
  <h1>GitHub Repo Branch Auditor</h1>
  <p class="subtitle">Shows the default branch of every repo across your account. <a href="settings.html">Set an API token</a> for 5,000 req/hr instead of 60.</p>

  <div class="controls mb">
    <input type="text" id="username" placeholder="GitHub username" value="lothrazar" />
    <span id="rate-badge" class="rate-badge anon">Unauthenticated — 60 req/hr</span>
  </div>

  <div class="controls">
    <button onclick="loadRepos()" id="load-btn">Audit repos</button>
    <input type="text" id="search" placeholder="Filter by repo or branch..." oninput="render()" />
    <select id="branch-filter" onchange="render()"><option value="all">All branches</option></select>
    <button id="btn-forks"    onclick="toggleForks()"    class="btn-active">Show forks</button>
    <button id="btn-archived" onclick="toggleArchived()">Show archived</button>
  </div>

  <div class="stats" id="stats"></div>
  <div id="table-wrap"><div class="loading">Enter a username and click Audit repos.</div></div>
  <div id="error" class="error-msg" style="display:none"></div>

  <script src="../js/shared.js"></script>
  <script>
    let allRepos = [];
    let sortCol = 'name';
    let sortDir = 1;
    let prLoadGen = 0;  // increment to cancel an in-flight PR load when repos reload
    let showArchived = false;
    let showForks = true;

    const cols = [
      { key: 'name',              label: 'Repo',           cls: 'col-name' },
      { key: 'default_branch',    label: 'Default branch', cls: 'col-branch' },
      { key: 'stargazers_count',  label: '⭐ Stars',       cls: 'col-stars',  numeric: true },
      { key: 'open_issues_count', label: '🐛 Issues',      cls: 'col-issues', numeric: true },
      { key: 'language',           label: 'Language',       cls: 'col-lang' },
      { key: 'license',           label: 'License',        cls: 'col-license' },
      { key: 'pushed_at',         label: 'Last push',      cls: 'col-updated' },
    ];


    function sortRepos(repos) {
      const colDef = cols.find(c => c.key === sortCol);
      return [...repos].sort((a, b) => {
        if (sortCol === 'pushed_at') {
          const av = a[sortCol] ? new Date(a[sortCol]).getTime() : 0;
          const bv = b[sortCol] ? new Date(b[sortCol]).getTime() : 0;
          return sortDir * (av - bv);
        }
        if (colDef && colDef.numeric) {
          return sortDir * ((a[sortCol] || 0) - (b[sortCol] || 0));
        }
        const av = sortCol === 'license' ? (a.license?.spdx_id || '') : String(a[sortCol] || '');
        const bv = sortCol === 'license' ? (b.license?.spdx_id || '') : String(b[sortCol] || '');
        return sortDir * av.localeCompare(bv);
      });
    }

    function toggleForks() {
      showForks = !showForks;
      const btn = document.getElementById('btn-forks');
      btn.textContent = showForks ? 'Hide forks' : 'Show forks';
      btn.classList.toggle('btn-active', showForks);
      render();
    }

    function toggleArchived() {
      showArchived = !showArchived;
      const btn = document.getElementById('btn-archived');
      btn.textContent = showArchived ? 'Hide archived' : 'Show archived';
      btn.classList.toggle('btn-active', showArchived);
      render();
    }

    function setSort(key) {
      if (sortCol === key) sortDir *= -1;
      else { sortCol = key; sortDir = 1; }
      render();
    }

    function render() {
      const search = document.getElementById('search').value.toLowerCase();
      const bf = document.getElementById('branch-filter').value;
      const user = document.getElementById('username').value.trim();

      // Base set: only fork/archived toggles applied — used for stats so counts
      // always reflect what the toggles show, unaffected by text/branch search.
      const baseRepos = allRepos.filter(r => {
        if (r.disabled)                  return false;  // always hidden
        if (!showForks    && r.fork)     return false;
        if (!showArchived && r.archived) return false;
        return true;
      });
      buildStats(baseRepos);

      let repos = baseRepos.filter(r => {
        const matchText = r.name.toLowerCase().includes(search) || (r.default_branch || '').toLowerCase().includes(search);
        if (!matchText) return false;
        if (bf !== 'all' && r.default_branch !== bf) return false;
        return true;
      });

      repos = sortRepos(repos);

      const prTh = `<th class="col-pr" title="Has pull requests">🔀</th>`;
      const thead = `<thead><tr>${prTh}${cols.map(c => {
        const active = sortCol === c.key;
        const arrow = active ? (sortDir === 1 ? '▲' : '▼') : '▲';
        return `<th class="${c.cls}${active ? ' sorted' : ''}" onclick="setSort('${c.key}')">${c.label}<span class="sort-arrow">${arrow}</span></th>`;
      }).join('')}</tr></thead>`;

      if (repos.length === 0) {
        document.getElementById('table-wrap').innerHTML = '<div class="empty">No repos match your filter.</div>';
        return;
      }

      const rows = repos.map(r => {
        const updated = r.pushed_at
          ? new Date(r.pushed_at).toLocaleDateString('en-CA', { year: 'numeric', month: 'short', day: 'numeric' })
          : '—';
        const prCell = r._prs === undefined
          ? `<td class="col-pr" id="pr-cell-${r.name}"><span class="pr-loading">·</span></td>`
          : r._prs === 0
            ? `<td class="col-pr" id="pr-cell-${r.name}"><span class="pr-alert" title="No open pull requests">✅</span></td>`
            : `<td class="col-pr" id="pr-cell-${r.name}"><span class="pr-alert" title="${r._prs} open pull request${r._prs > 1 ? 's' : ''}">⚠️</span></td>`;
        const rowClass = r.archived ? 'row-archived' : r.fork ? 'row-fork' : '';
        return `<tr${rowClass ? ` class="${rowClass}"` : ''}>
          ${prCell}
          <td class="col-name"><a href="https://github.com/${user}/${r.name}" target="_blank">${r.name}</a></td>
          <td class="col-branch"><span class="branch">${r.default_branch || '—'}</span></td>
          <td class="col-stars">${r.stargazers_count ?? '—'}</td>
          <td class="col-issues">${r.open_issues_count ?? '—'}</td>
          <td class="col-lang">${r.language || '—'}</td>
          <td class="col-license">${r.license?.spdx_id || '—'}</td>
          <td class="col-updated">${updated}</td>
        </tr>`;
      }).join('');

      document.getElementById('table-wrap').innerHTML = `<table>${thead}<tbody>${rows}</tbody></table>`;
    }

    function buildStats(repos) {
      const counts = {};
      for (const r of repos) {
        const b = r.default_branch || '(none)';
        counts[b] = (counts[b] || 0) + 1;
      }
      const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]);

      const sel = document.getElementById('branch-filter');
      const prev = sel.value;
      sel.innerHTML = '<option value="all">All branches</option>' +
        sorted.map(([b, c]) => `<option value="${b}">${b} (${c})</option>`).join('');
      if ([...sel.options].some(o => o.value === prev)) sel.value = prev;

      const currentSearch = document.getElementById('search').value;
      document.getElementById('stats').innerHTML = sorted.map(([b, c]) => {
        const active = currentSearch === b;
        return `<div class="stat${active ? ' stat-active' : ''}" style="cursor:pointer" onclick="statClick(this)" data-branch="${b.replace(/&/g,'&amp;').replace(/"/g,'&quot;')}">
          <div class="stat-val">${c}</div>
          <div class="stat-lbl">${b}</div>
        </div>`;
      }).join('');
    }

    function statClick(el) {
      const branch = el.dataset.branch;
      const searchEl = document.getElementById('search');
      searchEl.value = searchEl.value === branch ? '' : branch;
      render();
    }

    async function loadPRStatuses(user, repos) {
      const gen = ++prLoadGen;
      for (const r of repos) {
        if (gen !== prLoadGen) break;  // a new load started — stop
        try {
          const res = await fetch(
            `https://api.github.com/repos/${encodeURIComponent(user)}/${encodeURIComponent(r.name)}/pulls?per_page=1&state=open`,
            { headers: authHeaders() }
          );
          if (!res.ok) { r._prs = 0; }
          else {
            const data = await res.json();
            // per_page=1 tells us "any?" — read Link header for total if present
            if (data.length === 0) {
              r._prs = 0;
            } else {
              // Try to extract total from Link rel="last" page number
              const link = res.headers.get('Link') || '';
              const match = link.match(/[?&]page=(\d+)>;\s*rel="last"/);
              r._prs = match ? parseInt(match[1], 10) : 1;
            }
          }
        } catch (_) {
          r._prs = 0;  // on error, treat as clean — don't block the loop
        }
        // Update the cell in place without a full re-render
        const cell = document.getElementById(`pr-cell-${r.name}`);
        if (cell) {
          cell.innerHTML = r._prs === 0
            ? `<span class="pr-alert" title="No open pull requests">✅</span>`
            : `<span class="pr-alert" title="${r._prs} open pull request${r._prs > 1 ? 's' : ''}">⚠️</span>`;
        }
      }
    }

    async function loadRepos() {
      const user = document.getElementById('username').value.trim();
      if (!user) return;

      prLoadGen++;  // cancel any in-flight PR load from a previous run

      const errEl = document.getElementById('error');
      errEl.style.display = 'none';
      document.getElementById('table-wrap').innerHTML = `<div class="loading">Loading repos for ${user}...</div>`;
      document.getElementById('stats').innerHTML = '';
      document.getElementById('load-btn').disabled = true;

      allRepos = [];
      let page = 1;
      try {
        while (true) {
          const res = await fetch(`https://api.github.com/users/${encodeURIComponent(user)}/repos?per_page=100&page=${page}`, { headers: authHeaders() });
          if (res.status === 403 || res.status === 429) {
            const msg = await res.json().catch(() => ({}));
            const extra = !getToken() ? ' Set an API token on the home page to increase your rate limit to 5,000/hr.' : '';
            throw new Error((msg.message || `API error ${res.status}`) + extra);
          }
          if (!res.ok) throw new Error(`GitHub API returned ${res.status} — check the username`);
          const data = await res.json();
          if (!data.length) break;
          allRepos = allRepos.concat(data);
          if (data.length < 100) break;
          page++;
        }
        allRepos.sort((a, b) => a.name.localeCompare(b.name));
        render();
        // Kick off PR status fetch in the background — fills in cells one by one
        loadPRStatuses(user, allRepos);
      } catch (e) {
        document.getElementById('table-wrap').innerHTML = '';
        errEl.textContent = e.message;
        errEl.style.display = 'block';
      } finally {
        document.getElementById('load-btn').disabled = false;
      }
    }

    document.getElementById('username').addEventListener('keydown', e => { if (e.key === 'Enter') loadRepos(); });

  </script>
</body>
</html>
